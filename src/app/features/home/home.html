<section class="hero">

    <div class="hero-content">
        <p class="subtitle">NEW SEASON COLLECTION</p>

        <h1>
            Performance<br>
            Meets Style
        </h1>

        <p class="description">
            Premium sportswear designed for athletes who never stop.
        </p>

        <button>
            SHOP NOW
        </button>
    </div>

</section>

<section class="categories">

    <div class="category-card">
        Men
    </div>

    <div class="category-card">
        Women
    </div>

    <div class="category-card">
        Accessories
    </div>

</section>

<div class="filters">

    <input type="text" placeholder="Search products..." [(ngModel)]="searchTerm" (input)="filterProducts()">

    <select [(ngModel)]="selectedCategory" (change)="filterProducts()">

        <option value="All">All</option>
        <option value="Men">Men</option>
        <option value="Women">Women</option>
        <option value="Accessories">Accessories</option>

    </select>

</div>

<section class="featured-products">

    <h2>Featured Products</h2>

    <div class="products-grid">

        <div class="product-card" *ngFor="let product of filteredProducts">

            <img [src]="product.image" [alt]="product.name">

            <h3>{{ product.name }}</h3>

            <p>₹{{ product.price }}</p>

            <button (click)="addToCart(product)">

                Add to Cart

            </button>
            <button class="details-btn" [routerLink]="['/product', product.id]">

                View Details

            </button>

        </div>

    </div>

</section>
