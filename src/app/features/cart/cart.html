<div class="cart-container">

  <h1>Shopping Cart</h1>

  <div
    class="cart-item"
    *ngFor="let item of cartItems">

    <div class="item-details">

      <h3>{{ item.name }}</h3>

      <p>₹{{ item.price }}</p>

    </div>

    <button (click)="removeItem(item.id)">
      Remove
    </button>

  </div>

  <div class="cart-summary">

    <h2>Total: ₹{{ total }}</h2>

    <button class="checkout-btn">
      Proceed to Checkout
    </button>

  </div>

</div>
