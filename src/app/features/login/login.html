<div class="login-container">

    <div class="login-card">

        <h1>Admin Login</h1>

        <input type="email" placeholder="Email" [(ngModel)]="email">

        <input type="password" placeholder="Password" [(ngModel)]="password">

        <button (click)="login()">
            Login
        </button>
        <p class="error" *ngIf="errorMessage">
            {{ errorMessage }}
        </p>

    </div>

</div>
