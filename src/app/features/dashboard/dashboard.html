<div class="dashboard">

    <h1>My Dashboard</h1>
    <div class="stats-container">

  <div class="stat-card">

    <div class="icon completed">
      <i class="fa-solid fa-circle-check"></i>
    </div>

    <div class="info">
      <p>Completed Orders</p>
      <h2>0</h2>
    </div>

  </div>

  <div class="stat-card">

    <div class="icon pending">
      <i class="fa-solid fa-clock"></i>
    </div>

    <div class="info">
      <p>Pending Orders</p>
      <h2>0</h2>
    </div>

  </div>

  <div class="stat-card">

    <div class="icon wishlist">
      <i class="fa-solid fa-heart"></i>
    </div>

    <div class="info">
      <p>Wishlist</p>
      <h2>0</h2>
    </div>

  </div>

</div>
<div class="orders-section">

    <div class="section-header">

        <h2>Recent Orders</h2>

        <a routerLink="/orders">
            View All
        </a>

    </div>

    <table class="orders-table">

        <thead>

            <tr>

                <th>Order ID</th>

                <th>Date</th>

                <th>Status</th>

                <th>Amount</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let order of recentOrders">

                <td>{{ order.id }}</td>

                <td>{{ order.date }}</td>

                <td>

                    <span
                        [class.delivered]="order.status==='Delivered'"
                        [class.processing]="order.status==='Processing'"
                        [class.pending]="order.status==='Pending'">

                        {{ order.status }}

                    </span>

                </td>

                <td>₹{{ order.amount }}</td>

            </tr>

        </tbody>

    </table>

</div>

</div>
