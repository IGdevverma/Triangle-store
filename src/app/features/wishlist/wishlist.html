<div class="wishlist-container">

    <h1>MY WISHLIST</h1>

    <div class="wishlist-grid">

        <div class="wishlist-item"
             *ngFor="let item of wishlistItems">

            <div class="image-box">

                <button class="remove-icon"
                        (click)="remove(item.id!)">
                    ✕
                </button>

                <img [src]="item.image"
                     [alt]="item.name">

            </div>

            <h3>{{ item.name }}</h3>

            <p class="price">
                ₹{{ item.price }}
            </p>

            <p class="color">
                Colour: {{ item.colors || 'Default' }}
            </p>

            <button class="bag-btn"
                    (click)="moveToCart(item)">

                ADD TO BAG

            </button>

        </div>

    </div>

</div>
